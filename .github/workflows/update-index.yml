name: Update plugin index

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/update-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build plugins/index.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = 'plugins';
          const imageNames = [
            'screenshot.png',
            'screenshot.jpg',
            'screenshot.jpeg',
            'screenshot.webp',
            'screen.png',
            'screen.jpg',
            'preview.png',
            'preview.jpg'
          ];
          const iconNames = ['icon.png', 'icon.jpg', 'icon.jpeg', 'icon.webp'];

          function prettyName(name) {
            return String(name || '')
              .replace(/[-_]+/g, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .replace(/\b\w/g, s => s.toUpperCase());
          }

          function findFirst(files, names) {
            const lower = new Map(files.map(file => [file.toLowerCase(), file]));
            for (const name of names) {
              const found = lower.get(name.toLowerCase());
              if (found) return found;
            }
            return '';
          }

          const plugins = [];

          if (fs.existsSync(root)) {
            for (const dir of fs.readdirSync(root).sort()) {
              const folder = path.join(root, dir);
              if (!fs.statSync(folder).isDirectory()) continue;

              const files = fs.readdirSync(folder);
              const pluginFile = findFirst(files, ['plugin.js', 'index.js', 'main.js']);
              if (!pluginFile) continue;

              const textFile = findFirst(files, ['text.txt', 'description.txt', 'readme.txt', 'README.md', 'readme.md']);
              const icon = findFirst(files, iconNames);
              const screenshot = findFirst(files, imageNames);

              let name = prettyName(dir);
              let description = '';

              if (textFile) {
                const raw = fs.readFileSync(path.join(folder, textFile), 'utf8').replace(/\r/g, '').trim();
                const lines = raw.split('\n').map(line => line.trim()).filter(Boolean);

                if (lines[0]) name = lines[0].replace(/^#\s*/, '');
                if (lines.length > 1) description = lines.slice(1).join('\n').trim();
                else description = lines[0] || '';
              }

              plugins.push({
                id: dir,
                name,
                description,
                folder: `${root}/${dir}`,
                file: pluginFile,
                category: 'Плагины',
                version: '1.0.0',
                icon,
                screenshots: screenshot ? [screenshot] : []
              });
            }
          }

          const index = {
            name: '100 мелочей',
            updated: new Date().toISOString(),
            plugins
          };

          fs.writeFileSync(path.join(root, 'index.json'), JSON.stringify(index, null, 2) + '\n');
          NODE

      - name: Commit updated index
        run: |
          if git diff --quiet -- plugins/index.json; then
            echo "index.json is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/index.json
          git commit -m "Update plugin index"
          git push
