name: Update plugin index

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/update-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build plugins/index.json
        run: node tools/build-index.js

      - name: Commit updated index
        run: |
          if git diff --quiet -- plugins/index.json; then
            echo "index.json is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/index.json
          git commit -m "Update plugin index"
          git push
